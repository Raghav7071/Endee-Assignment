services:
  # ─── Endee Vector Database (Backend) ────────────────────────────────────
  - type: web
    name: endee-server
    runtime: image
    image:
      url: docker.io/endeeio/endee-server:latest
    plan: starter          # needs persistent disk; upgrade from free if you want data to survive restarts
    port: 8080
    envVars:
      - key: NDD_NUM_THREADS
        value: "0"
      - key: NDD_AUTH_TOKEN
        value: ""
    disk:
      name: endee-data
      mountPath: /data
      sizeGB: 1

  # ─── GovScheme AI Chatbot (Frontend / Streamlit) ─────────────────────────
  - type: web
    name: govscheme-app
    runtime: docker
    plan: free             # can run on free tier; note it will sleep after 15 min inactivity
    port: 8501
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ENDEE_URL
        fromService:
          name: endee-server
          type: web
          property: hostport   # automatically injected as http://<host>:<port>
      - key: INDEX_NAME
        value: govt_schemes
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: TOP_K
        value: "3"
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_API_KEY
        sync: false          # you will enter this manually in the Render dashboard
      - key: PYTHONUNBUFFERED
        value: "1"
